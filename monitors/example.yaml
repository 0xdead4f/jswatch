monitors:
  # ──────────────────────────────────────────────
  # 1. Static JavaScript file
  # ──────────────────────────────────────────────
  # Just point directly at the JS URL. No pipeline needed.

  - id: "main_script"
    start_url: "https://example.com/main.js"
    headers:
      Cookie: "session=admin"
    max_line_length: 500

  # ──────────────────────────────────────────────
  # 2. Dynamic JS (single extraction)
  # ──────────────────────────────────────────────
  # Fetch a page, extract the JS path, then fetch + validate.

  - id: "dynamic_script"
    start_url: "https://example.com/page.html"
    headers:
      User-Agent: "Mozilla/5.0"
    pipeline:
      - extract: '<script.*?src="(/static/.*?\.js)".*?>'
        template: "https://example.com{extracted}"
      - validate: "specific_function_name"

  # ──────────────────────────────────────────────
  # 3. Multi-step pipeline (Nuxt / Webpack chunks)
  # ──────────────────────────────────────────────
  # Each step's output automatically feeds the next.
  # No {step0} needed!

  - id: "nuxt_chunk"
    start_url: "https://example.com/home/"
    pipeline:
      # Step 1: Extract JS path from homepage HTML
      - extract: '<script.*?src="(.*?\.js)".*?>'
        template: "https://example.com{extracted}"

      # Step 2: Extract a hash from inside that JS file
      - extract: "hash=['\"]([a-f0-9]+)['\"]"
        template: "https://example.com/_nuxt/{extracted}.js"

      # Step 3: Validate the final JS content
      - validate: "SPECIFIC_FUNCTION_NAME"

  # ──────────────────────────────────────────────
  # 4. With statistics tracking
  # ──────────────────────────────────────────────
  # Count regex matches (API endpoints, tokens, etc.)

  - id: "api_tracker"
    start_url: "https://example.com/app.js"
    stats:
      - name: "API Endpoints"
        regex: "/api/v[0-9]+/.*"
      - name: "WebSocket URLs"
        regex: "wss?://[^\\s\"']+"

  # ──────────────────────────────────────────────
  # 5. Complex multi-step with validation
  # ──────────────────────────────────────────────

  - id: "complex_bundle"
    start_url: "https://example.com/app"
    headers:
      Authorization: "Bearer token123"
    pipeline:
      # Find the main script tag
      - extract: 'src="([^"]*\.js)"'
        template: "https://example.com{extracted}"

      # Find the loader reference inside it
      - extract: "(loader\\.js)"
        template: "https://example.com/scripts/{extracted}"

      # Extract bundle identifier from loader
      - extract: "bundleId=['\"]([^'\"]+)['\"]"
        template: "https://example.com/bundles/{extracted}.js"

      # Final validation
      - validate: "APP_INITIALIZED"

  # ──────────────────────────────────────────────
  # 6. Auto-resolve relative URL (no template needed!)
  # ──────────────────────────────────────────────
  # If you skip `template`, JSWatch auto-resolves the
  # extracted path relative to the current URL using urljoin.

  - id: "auto_resolve"
    start_url: "https://example.com/app/"
    pipeline:
      - extract: 'src="([^"]+\.js)"'
      # no template → extracted "/js/app.abc123.js" auto-joined
      # to "https://example.com/js/app.abc123.js"
